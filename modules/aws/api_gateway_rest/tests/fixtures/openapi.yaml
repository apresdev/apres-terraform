openapi: 3.0.3
info:
  title: Webhook Example
  version: 1.0.0
  description: ${description}
paths:
  /helloworld:
    get:
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelloWorld"

      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: 200
            responseTemplates:
              application/json: '{"id": 123, "message": "Hello World ${timestamp}!"}'
components:
  schemas:
    HelloWorld:
      type: object
      required:
        - id
        - message
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string